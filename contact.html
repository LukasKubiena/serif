<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Serif</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
  <link rel="preload" href="NeueHaasDisplay-Light.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'NeueHaasDisplay-Light';
      src: url('NeueHaasDisplay-Light.woff2') format('woff2');
      font-display: swap;
    }

    :root {
      --padding-y: clamp(14px, 2vh, 28px);
      --padding-x: clamp(14px, 2vw, 28px);
      --ui: #ffffff;
      --font-size: 13.5px;
      --line-height: 1.37;
    }

    @media (max-width: 768px) {
      :root { --font-size: 14.5px; --line-height: 1.51; }
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'NeueHaasDisplay-Light', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: var(--font-size);
      font-weight: 300;
      line-height: var(--line-height);
      letter-spacing: -0.02em;
      color: var(--ui);
      background: #111;
    }

    body.is-leaving {
      opacity: 0;
      transition: opacity 0.65s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }

    .home-logo {
      position: fixed;
      top: var(--padding-y);
      left: var(--padding-x);
      width: 24px;
      height: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-logo img {
      width: 100%;
      height: 100%;
      display: block;
      transform: rotate(-45deg);
      animation: logoSpinIn 0.75s cubic-bezier(0.2, 0.8, 0.2, 1) 0.15s forwards;
    }

    .home-logo.closing img {
      animation: logoSpinOut 0.65s cubic-bezier(0.5, 0, 0.2, 1) forwards;
    }

    @keyframes logoSpinIn {
      0% { transform: rotate(-45deg); opacity: 0; }
      100% { transform: rotate(0deg); opacity: 1; }
    }

    @keyframes logoSpinOut {
      0% { transform: rotate(0deg); opacity: 1; }
      100% { transform: rotate(45deg); opacity: 0; }
    }

    .wrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--padding-y) * 2) var(--padding-x);
    }

    .card {
      width: min(42ch, 100%);
      max-width: 520px;
    }

    .card > * {
      opacity: 0;
      transform: translate3d(0, 6px, 0);
      filter: blur(0.2px);
      will-change: opacity, transform, filter;
    }

    body.has-entered .card > * {
      animation: contactIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    body.has-entered .card > *:nth-child(1) { animation-delay: 0.05s; }
    body.has-entered .card > *:nth-child(2) { animation-delay: 0.09s; }
    body.has-entered .card > *:nth-child(3) { animation-delay: 0.14s; }
    body.has-entered .card > *:nth-child(4) { animation-delay: 0.18s; }
    body.has-entered .card > *:nth-child(5) { animation-delay: 0.22s; }
    body.has-entered .card > *:nth-child(6) { animation-delay: 0.26s; }

    @keyframes contactIn {
      to { opacity: 1; transform: translate3d(0, 0, 0); filter: blur(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .card > * { opacity: 1; transform: none; filter: none; animation: none !important; }
      body.has-entered .card > * { animation: none !important; }
    }

    .card h1 {
      margin: 0 0 1.1em;
      font-size: clamp(17px, 2.1vw, 22px);
      font-weight: 300;
      letter-spacing: -0.03em;
    }

    label {
      display: block;
      margin-bottom: 0.35em;
      font-size: 0.92em;
      opacity: 0.88;
    }

    .field { margin-bottom: 1.1em; }

    input, textarea {
      width: 100%;
      margin: 0;
      padding: 0.55em 0.65em;
      font: inherit;
      letter-spacing: inherit;
      color: #111;
      background: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
    }

    textarea {
      min-height: 9em;
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: 1px solid rgba(255,255,255,0.45);
      outline-offset: 2px;
    }

    button[type="submit"] {
      font: inherit;
      letter-spacing: inherit;
      padding: 0.55em 1.2em;
      margin-top: 0.25em;
      color: #111;
      background: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button[type="submit"]:hover { opacity: 0.88; }

    .status {
      margin-top: 0.85em;
      font-size: 0.92em;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .status.visible { opacity: 0.85; }

    .footnote {
      margin-top: 1.5em;
      font-size: 0.88em;
      opacity: 0.72;
    }

    .footnote a { color: inherit; }
  </style>
</head>
<body>
  <a href="index.html" class="home-logo" id="homeLogo" aria-label="Back to home">
    <img src="logo2.svg" alt="Home">
  </a>

  <div class="wrap">
    <div class="card">
      <h1>From Serif, to?</h1>
      <form id="contactForm" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">Send</button>
        <p class="status" id="formStatus" role="status" aria-live="polite"></p>
      </form>
      <p class="footnote">Or email us directly at <a href="mailto:lukasmariakubiena@gmail.com">lukasmariakubiena@gmail.com</a>.</p>
    </div>
  </div>

  <script>
    (function () {
      const prefersReducedMotion = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      requestAnimationFrame(() => {
        document.body.classList.add('has-entered');
      });

      const form = document.getElementById('contactForm');
      const statusEl = document.getElementById('formStatus');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const name = String(fd.get('name') || '').trim();
        const email = String(fd.get('email') || '').trim();
        const message = String(fd.get('message') || '').trim();
        if (!name || !email || !message) {
          statusEl.textContent = 'Please fill in all fields.';
          statusEl.classList.add('visible');
          return;
        }
        const subject = encodeURIComponent('Serif — contact');
        const body = encodeURIComponent(
          'Name: ' + name + '\nEmail: ' + email + '\n\n' + message
        );
        window.location.href = 'mailto:lukasmariakubiena@gmail.com?subject=' + subject + '&body=' + body;
        statusEl.textContent = 'Opening your email app…';
        statusEl.classList.add('visible');
      });

      const homeLogo = document.getElementById('homeLogo');
      const homeLogoImg = homeLogo ? homeLogo.querySelector('img') : null;
      homeLogo.addEventListener('click', (e) => {
        try { sessionStorage.setItem('skipIntroOnce', '1'); } catch (_) {}
        if (prefersReducedMotion) return;
        e.preventDefault();
        if (homeLogoImg) homeLogo.classList.add('closing');
        document.body.classList.add('is-leaving');
        setTimeout(() => { window.location.href = homeLogo.href; }, 650);
      });
    })();
  </script>
</body>
</html>
